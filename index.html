<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>마음 상담소</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e11;
      --surface: #1a1820;
      --surface2: #221f2a;
      --accent: #c8a96e;
      --accent2: #e8c99e;
      --text: #f0ece4;
      --text2: #a09890;
      --text3: #665e58;
      --user-bubble: #2a2340;
      --ai-bubble: #1e1c24;
      --border: rgba(200,169,110,0.15);
      --glow: rgba(200,169,110,0.08);
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(120,80,180,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(200,169,110,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      padding: 1.2rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(15,14,17,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--accent2);
      letter-spacing: 0.08em;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
      letter-spacing: 0.05em;
    }

    /* Category bar */
    .cat-bar {
      display: flex;
      gap: 6px;
      padding: 0.6rem 1rem;
      overflow-x: auto;
      background: rgba(15,14,17,0.85);
      border-bottom: 1px solid var(--border);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: relative;
      z-index: 9;
      flex-shrink: 0;
    }
    .cat-bar::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(200,169,110,0.2);
      background: transparent;
      color: var(--text3);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .cat-btn:active { transform: scale(0.95); }

    .cat-btn.active {
      background: rgba(200,169,110,0.15);
      border-color: var(--accent);
      color: var(--accent2);
    }


    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .chat-area::-webkit-scrollbar { display: none; }

    /* Welcome state */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0.8rem;
    }

    .welcome-icon {
      font-size: 40px;
      opacity: 0.6;
      margin-bottom: 0.5rem;
    }

    .welcome h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--accent2);
    }

    .welcome p {
      font-size: 14px;
      color: var(--text3);
      line-height: 1.8;
      max-width: 260px;
    }

    /* Message bubbles */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 11px;
      color: var(--text3);
      padding: 0 4px;
      letter-spacing: 0.04em;
    }

    .msg-group.user .msg-label { text-align: right; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.7;
      max-width: 88%;
      word-break: keep-all;
    }

    .msg-group.user { align-items: flex-end; }
    .msg-group.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(140,120,200,0.2);
      border-bottom-right-radius: 5px;
      color: #d4ccee;
    }

    .msg-group.ai { align-items: flex-start; }
    .msg-group.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    /* Typing indicator */
    .typing-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 14px 18px;
      display: none;
      gap: 5px;
      align-items: center;
      width: fit-content;
      animation: fadeUp 0.3s ease;
    }

    .typing-bubble.show { display: flex; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Bottom controls */
    .controls {
      position: relative;
      z-index: 10;
      padding: 1rem 1.5rem 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      background: rgba(15,14,17,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .status-text {
      font-size: 13px;
      color: var(--text3);
      letter-spacing: 0.03em;
      min-height: 18px;
      text-align: center;
    }

    .status-text.active { color: var(--accent); }

    /* Mic button */
    .mic-wrap {
      position: relative;
    }

    .mic-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }

    .mic-ring.pulse {
      animation: ring 1.5s ease-out infinite;
    }

    @keyframes ring {
      0% { opacity: 0.5; transform: scale(0.95); }
      100% { opacity: 0; transform: scale(1.4); }
    }

    .mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      background: var(--surface2);
      cursor: pointer;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 20px rgba(200,169,110,0.1);
    }

    .mic-btn:active { transform: scale(0.93); }

    .mic-btn.listening {
      background: rgba(200,169,110,0.15);
      border-color: var(--accent2);
      box-shadow: 0 0 30px rgba(200,169,110,0.2);
    }

    .mic-btn.thinking {
      border-color: rgba(140,120,200,0.5);
      box-shadow: 0 0 20px rgba(140,120,200,0.15);
      animation: spin-glow 2s linear infinite;
    }

    @keyframes spin-glow {
      0%,100% { box-shadow: 0 0 20px rgba(140,120,200,0.15); }
      50% { box-shadow: 0 0 35px rgba(140,120,200,0.25); }
    }

    .hint {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
    }

    /* Speaking indicator */
    .speaking-bar {
      display: flex;
      gap: 3px;
      align-items: center;
      height: 16px;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0;
      transform-origin: bottom;
    }

    .speaking-bar.active .bar {
      opacity: 0.8;
      animation: wave 0.8s ease-in-out infinite;
    }

    .bar:nth-child(1) { animation-delay: 0s; height: 6px; }
    .bar:nth-child(2) { animation-delay: 0.1s; height: 10px; }
    .bar:nth-child(3) { animation-delay: 0.2s; height: 14px; }
    .bar:nth-child(4) { animation-delay: 0.1s; height: 10px; }
    .bar:nth-child(5) { animation-delay: 0s; height: 6px; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">✦</div>
  <div>
    <h1>마음 상담소</h1>
    <div class="subtitle"><span class="category-label">종합 상담</span> AI</div>
  </div>
</header>

<div class="cat-bar" id="catBar">
  <button class="cat-btn active" data-cat="general"    onclick="selectCategory('general')">✦ 종합</button>
  <button class="cat-btn" data-cat="mental"       onclick="selectCategory('mental')">🧠 심리</button>
  <button class="cat-btn" data-cat="career"       onclick="selectCategory('career')">💼 직장</button>
  <button class="cat-btn" data-cat="relationship" onclick="selectCategory('relationship')">💬 관계</button>
  <button class="cat-btn" data-cat="health"       onclick="selectCategory('health')">🌿 건강</button>
  <button class="cat-btn" data-cat="finance"      onclick="selectCategory('finance')">💰 재무</button>
  <button class="cat-btn" data-cat="study"        onclick="selectCategory('study')">📚 공부</button>
  <button class="cat-btn" data-cat="life"         onclick="selectCategory('life')">🌙 인생</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🕯️</div>
    <h2>안녕하세요</h2>
    <p>무슨 일이 있으셨나요?<br>편하게 말씀해 주세요.<br>조용히 귀 기울여 드릴게요.</p>
  </div>
  <div class="typing-bubble" id="typingBubble">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="controls">
  <div style="display:flex; align-items:center; gap:8px;">
    <div class="speaking-bar" id="speakingBar">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="status-text" id="statusText">아래 버튼을 눌러 말씀해 주세요</div>
    <div class="speaking-bar" id="speakingBar2">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <div class="mic-wrap">
    <div class="mic-ring" id="micRing"></div>
    <button class="mic-btn" id="micBtn" ontouchstart="handleTouch()" onclick="toggleListen()">🎤</button>
  </div>

  <div class="hint" id="hint">누르고 말하기 · Chrome 권장</div>
</div>

<script>
let recognition = null;
let isListening = false;
let isSpeaking = false;
let conversationHistory = [];

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('음성인식 미지원 — 텍스트 입력 모드로 전환됩니다', false);
    showTextInput();
    return null;
  }
  const r = new SR();
  r.lang = 'ko-KR';
  r.continuous = false;
  r.interimResults = false;

  r.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    setListening(false);
    addMessage('user', text);
    await askAI(text);
  };

  r.onerror = (e) => {
    setListening(false);
    if (e.error === 'no-speech') setStatus('소리가 없어서 다시 시도해요', false);
    else if (e.error === 'not-allowed') setStatus('마이크 권한을 허용해 주세요', false);
    else setStatus('다시 눌러 말씀해 주세요', false);
  };

  r.onend = () => { if (isListening) setListening(false); };
  return r;
}

function handleTouch() {
  // Prevent double-fire on mobile
}

function toggleListen() {
  if (isSpeaking) {
    speechSynthesis.cancel();
    setSpeaking(false);
  }

  if (!recognition) recognition = initRecognition();
  if (!recognition) return;

  if (isListening) {
    recognition.stop();
    setListening(false);
  } else {
    try {
      recognition.start();
      setListening(true);
    } catch(e) {
      // Already started — stop and restart
      try { recognition.stop(); } catch(_) {}
      setTimeout(() => {
        try { recognition.start(); setListening(true); } catch(_) {}
      }, 300);
    }
  }
}

function setListening(val) {
  isListening = val;
  const btn = document.getElementById('micBtn');
  const ring = document.getElementById('micRing');
  btn.classList.toggle('listening', val);
  btn.classList.remove('thinking');
  ring.classList.toggle('pulse', val);
  btn.textContent = val ? '⏹' : '🎤';
  if (val) setStatus('듣고 있어요...', true);
  else if (!isSpeaking) setStatus('아래 버튼을 눌러 말씀해 주세요', false);
}

function setThinking(val) {
  const btn = document.getElementById('micBtn');
  const typing = document.getElementById('typingBubble');
  btn.classList.toggle('thinking', val);
  btn.classList.remove('listening');
  btn.textContent = val ? '💭' : '🎤';
  typing.classList.toggle('show', val);
  if (val) setStatus('생각 중...', true);
  scrollBottom();
}

function setSpeaking(val) {
  isSpeaking = val;
  document.getElementById('speakingBar').classList.toggle('active', val);
  document.getElementById('speakingBar2').classList.toggle('active', val);
  if (val) setStatus('말하는 중...', true);
  else setStatus('아래 버튼을 눌러 말씀해 주세요', false);
  const btn = document.getElementById('micBtn');
  if (val) btn.textContent = '🔊';
  else { btn.textContent = '🎤'; btn.classList.remove('thinking'); }
}

function setStatus(msg, active) {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.classList.toggle('active', !!active);
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const typing = document.getElementById('typingBubble');
  const area = document.getElementById('chatArea');

  const group = document.createElement('div');
  group.className = 'msg-group ' + role;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? '나' : '상담사';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  group.appendChild(label);
  group.appendChild(bubble);
  area.insertBefore(group, typing);
  scrollBottom();
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

let currentCategory = 'general';

const SYSTEMS = {
  general: `당신은 따뜻하고 지혜로운 종합 상담사입니다. 어떤 주제든 깊이 있게 공감하고 실질적인 도움을 줍니다.
사용자의 말을 주의 깊게 듣고, 감정을 먼저 인정한 뒤 구체적이고 실용적인 조언을 4~5문장으로 해주세요.
말하듯 자연스럽고 따뜻하게 답하세요.`,

  mental: `당신은 10년 경력의 임상심리사이자 상담심리사입니다. CBT(인지행동치료), ACT(수용전념치료), 마음챙김 기반 접근법에 능숙합니다.
다음 원칙을 따르세요:
1. 감정 반영: 사용자가 느끼는 감정을 먼저 정확히 짚어줍니다.
2. 정상화: "그런 감정은 자연스러운 반응입니다"처럼 경험을 정상화합니다.
3. 탐색 질문: 한 번에 하나의 탐색 질문으로 더 깊이 파고듭니다.
4. 실용적 기법: 호흡법, 인지재구성, 행동활성화 등 구체적 기법을 제안합니다.
5. 위기 감지: 자해/자살 언급 시 즉시 전문기관(자살예방상담전화 1393) 연결을 권합니다.
답변은 공감 → 탐색 → 제안 순서로 자연스럽게 4~5문장으로 해주세요.`,

  career: `당신은 15년 경력의 커리어 코치이자 취업/직장 전문 상담사입니다. HR, 헤드헌팅, 조직심리학 배경을 가지고 있습니다.
전문 영역: 취업·이직 전략, 이력서·자기소개서, 면접 준비, 직장 내 갈등, 번아웃, 연봉협상, 커리어 전환, 창업 vs 취업 고민, 워라밸, 상사/동료 관계.
답변 방식:
- 상황을 구체적으로 파악하는 질문을 먼저 합니다.
- 실제 현장 경험에서 나온 실용적 조언을 줍니다.
- 업계 트렌드와 현실적인 시장 상황을 반영합니다.
- 단계별 액션플랜을 제시할 때는 번호를 붙여 명확하게 합니다.
4~6문장으로 구체적이고 실행 가능하게 답하세요.`,

  relationship: `당신은 커플·가족·대인관계 전문 상담사입니다. 애착이론, 비폭력대화(NVC), 가트맨 부부치료 기법을 활용합니다.
전문 영역: 연애 갈등, 이별·실연, 결혼·혼전 고민, 부모·자녀 관계, 시댁·처가 문제, 친구 관계, 직장 내 인간관계, 외로움, 소통 방식 개선, 경계 설정.
답변 원칙:
- 절대 한쪽 편만 들지 않고 상대방 입장도 탐색합니다.
- "나 전달법(I-message)"과 같은 구체적 소통 기술을 알려줍니다.
- 관계 패턴(반복되는 갈등 구조)을 통찰하도록 돕습니다.
- 감정을 충분히 공감한 뒤 현실적인 대처법을 제안합니다.
따뜻하고 균형 잡힌 시각으로 4~5문장 답변하세요.`,

  health: `당신은 통합의학 전문가이자 건강·웰니스 코치입니다. 내과, 정신건강의학, 영양학, 운동의학 지식을 갖추고 있습니다.
전문 영역: 만성피로, 수면 문제, 다이어트·식이요법, 운동 계획, 스트레스성 신체증상, 생활습관 개선, 영양·보충제, 만성질환 관리, 갱년기·호르몬, 금연·금주.
중요 원칙:
- 진단은 하지 않으며, 심각한 증상은 반드시 병원 방문을 권합니다.
- 근거 기반(Evidence-based) 정보를 제공합니다.
- 현실적으로 실천 가능한 작은 변화부터 제안합니다.
- 개인차를 강조하고 획일적인 처방을 피합니다.
전문적이지만 이해하기 쉽게 4~5문장으로 답하세요.`,

  finance: `당신은 10년 경력의 개인 재무설계사(CFP)이자 경제·투자 전문 상담사입니다.
전문 영역: 가계부·지출 관리, 저축 전략, 투자 입문(주식·펀드·ETF·부동산), 대출·부채 관리, 신용점수, 보험 설계, 노후 준비, 세금 절약, 재테크 습관, 금융 심리(과소비·충동구매).
답변 원칙:
- 특정 종목 추천은 하지 않으며 원칙과 전략을 알려줍니다.
- 개인의 재무 상황(소득·지출·목표)을 먼저 파악합니다.
- "긴급자금 → 부채 상환 → 투자" 같은 우선순위 프레임을 활용합니다.
- 복잡한 금융 개념을 쉽고 구체적인 예시로 설명합니다.
실용적이고 구체적인 수치를 포함해 4~6문장으로 답하세요.`,

  study: `당신은 교육심리학 전문가이자 학습 코치입니다. 인지과학, 메타인지, 학습전략 전문 지식을 보유하고 있습니다.
전문 영역: 공부법·학습전략, 집중력·시간관리, 수험 스트레스, 시험 불안, 학습 슬럼프, 진로·학과 선택, 독서법, 기억력 향상, 자기주도학습, 학교·학원 고민.
활용 기법: 포모도로 기법, 간격 반복, 인출 연습, 마인드맵, 코넬 노트, 메타인지 전략.
답변 방식:
- 현재 학습 방식의 문제점을 친절하게 짚어줍니다.
- 과학적으로 검증된 학습법을 근거와 함께 설명합니다.
- 즉시 실천 가능한 구체적 방법을 제시합니다.
- 지나친 완벽주의나 자책을 부드럽게 다독입니다.
격려와 실용성을 담아 4~5문장으로 답하세요.`,

  life: `당신은 삶의 방향과 의미를 탐색하는 실존적·철학적 라이프 코치입니다. 긍정심리학, 의미치료(Logotherapy), 스토아 철학에 기반합니다.
전문 영역: 인생 목표·방향 설정, 자존감·자기 정체성, 무기력·허무감, 삶의 의미 찾기, 중년의 위기, 완벽주의, 비교 강박, 결정 장애, 변화에 대한 두려움, 미루기 습관.
답변 원칙:
- 판단하지 않고 깊이 공감합니다.
- 소크라테스식 질문으로 스스로 답을 찾도록 돕습니다.
- 철학적 통찰과 현실적 실천을 균형 있게 연결합니다.
- 작은 것에서 의미를 발견하도록 시각을 전환시킵니다.
따뜻하고 사려 깊게 4~5문장으로 답하세요.`
};

const CATEGORY_INFO = {
  general:      { icon: '✦', label: '종합 상담', color: '#c8a96e' },
  mental:       { icon: '🧠', label: '심리·감정', color: '#9b8fc8' },
  career:       { icon: '💼', label: '취업·직장', color: '#6aabcc' },
  relationship: { icon: '💬', label: '인간관계', color: '#c87d8f' },
  health:       { icon: '🌿', label: '건강·웰니스', color: '#6ab58a' },
  finance:      { icon: '💰', label: '재무·경제', color: '#c8b46a' },
  study:        { icon: '📚', label: '공부·학습', color: '#7a9cc8' },
  life:         { icon: '🌙', label: '인생·철학', color: '#a08ec8' }
};

function currentSystem() {
  return SYSTEMS[currentCategory] || SYSTEMS.general;
}

function selectCategory(cat) {
  currentCategory = cat;
  conversationHistory = [];

  // Update UI
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.cat-btn[data-cat="${cat}"]`);
  if (btn) btn.classList.add('active');

  const info = CATEGORY_INFO[cat];
  document.querySelector('.category-label').textContent = info.label;
  document.querySelector('.logo-mark').textContent = info.icon;

  // Clear chat
  const area = document.getElementById('chatArea');
  const typing = document.getElementById('typingBubble');
  area.innerHTML = '';
  area.appendChild(typing);

  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.id = 'welcome';
  const msgs = {
    general:      ['안녕하세요 😊', '어떤 고민이든 편하게 말씀해 주세요.\n무엇이든 함께 생각해 볼게요.'],
    mental:       ['마음이 힘드셨군요', '감정을 꺼내는 것만으로도 용기 있는 일이에요.\n지금 어떤 마음인지 말씀해 주세요.'],
    career:       ['커리어 고민, 함께해요', '취업, 이직, 직장생활 어떤 고민이든\n구체적으로 말씀해 주세요.'],
    relationship: ['관계가 힘드셨나요?', '연애, 가족, 친구, 직장 관계 모두\n편하게 털어놓으세요.'],
    health:       ['건강이 최우선이죠', '몸이나 생활습관에 대한 고민을\n편하게 말씀해 주세요.'],
    finance:      ['돈 걱정, 같이 풀어봐요', '저축, 투자, 지출, 부채 등\n재무 고민을 말씀해 주세요.'],
    study:        ['공부가 잘 안 되시나요?', '학습 방법, 집중력, 시험 준비 등\n어떤 고민이든 괜찮아요.'],
    life:         ['인생이 막막하게 느껴지시나요?', '삶의 방향, 의미, 자존감 등\n깊은 고민을 나눠보아요.']
  };
  const [title, desc] = msgs[cat] || msgs.general;
  welcome.innerHTML = `
    <div class="welcome-icon">${info.icon}</div>
    <h2>${title}</h2>
    <p>${desc}</p>
  `;
  area.insertBefore(welcome, typing);
}

async function askAI(userText) {
  setThinking(true);
  conversationHistory.push({ role: 'user', content: userText });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: currentSystem(),
        messages: conversationHistory
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || '죄송해요, 다시 한 번 말씀해 주세요.';
    conversationHistory.push({ role: 'assistant', content: reply });

    setThinking(false);
    addMessage('ai', reply);
    speak(reply);
  } catch(e) {
    setThinking(false);
    addMessage('ai', '네트워크 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
    setSpeaking(false);
  }
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();

  // Wait for voices on mobile
  function doSpeak() {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.92;
    u.pitch = 1.0;

    // Pick Korean voice if available
    const voices = speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko'));
    if (koVoice) u.voice = koVoice;

    u.onstart = () => setSpeaking(true);
    u.onend = () => setSpeaking(false);
    u.onerror = () => setSpeaking(false);
    speechSynthesis.speak(u);
  }

  if (speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    speechSynthesis.onvoiceschanged = doSpeak;
    setTimeout(doSpeak, 500); // fallback
  }
}

function showTextInput() {
  const controls = document.querySelector('.controls');
  controls.innerHTML = `
    <div style="display:flex;gap:8px;width:100%;max-width:480px;">
      <input id="txtIn" type="text" placeholder="메시지를 입력하세요..."
        style="flex:1;padding:12px 16px;border-radius:24px;border:1px solid rgba(200,169,110,0.3);
        background:#1a1820;color:#f0ece4;font-size:15px;font-family:inherit;outline:none;"
        onkeydown="if(event.key==='Enter')sendText()">
      <button onclick="sendText()" style="padding:12px 18px;border-radius:24px;border:1px solid rgba(200,169,110,0.4);
        background:#221f2a;color:#c8a96e;font-size:15px;cursor:pointer;font-family:inherit;">
        전송
      </button>
    </div>
  `;
}

async function sendText() {
  const inp = document.getElementById('txtIn');
  const text = inp?.value?.trim();
  if (!text) return;
  inp.value = '';
  addMessage('user', text);
  await askAI(text);
}
</script>
